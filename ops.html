// ── GRAIN (brand texture — matches public site) ───────────────────────────────
function Grain() {
  return (
    <div style={{
      position:"fixed", inset:0, pointerEvents:"none", zIndex:999, opacity:0.18,
      backgroundImage:`url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E")`,
      mixBlendMode:"multiply",
    }}/>
  );
}

// ── SPINE URL ─────────────────────────────────────────────────────────────────
// Single source of truth — same value used by both Operator Suite and Public Site.
// Paste your deployed Apps Script Web App URL here.
const SPINE_URL = "";

const adapter = {
  async read(sheet) {
    if (!SPINE_URL) return null; // offline — caller uses mock
    try {
      const r = await fetch(`${SPINE_URL}?sheet=${sheet}`);
      const j = await r.json();
      return j.ok ? j.data : null;
    } catch { return null; }
  },
  async append(sheet, data) {
    if (!SPINE_URL) return { ok:false, offline:true };
    try {
      const r = await fetch(SPINE_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ action:"append", sheet, data }),
      });
      return await r.json();
    } catch(e) { return { ok:false, error:e.message }; }
  },
  async updateRow(sheet, id, data) {
    if (!SPINE_URL) return { ok:false, offline:true };
    try {
      const r = await fetch(SPINE_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ action:"updateRow", sheet, id, data }),
      });
      return await r.json();
    } catch(e) { return { ok:false, error:e.message }; }
  },
  async updateCell(sheet, id, field, value) {
    if (!SPINE_URL) return { ok:false, offline:true };
    try {
      const r = await fetch(SPINE_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ action:"update", sheet, id, field, value }),
      });
      return await r.json();
    } catch(e) { return { ok:false, error:e.message }; }
  },
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
function useIsMobile() {
  const [m, setM] = useState(window.innerWidth < 680);
  useEffect(() => {
    const h = () => setM(window.innerWidth < 680);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return m;
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function statusColor(s) {
  return { DEMO:T.amber, PITCH:T.green, QUEUED:T.blue, STRATEGIC:T.steel, PROSPECT:T.steelLo, OVERDUE:T.red, PENDING:T.dim, BUILDING:T.blue }[s] || T.steelLo;
}
function priorityColor(p) { return { HIGH:T.red, MEDIUM:T.amber, LOW:T.steelLo }[p] || T.steelLo; }

// ── ATOMS ─────────────────────────────────────────────────────────────────────
function Badge({ label, color }) {
  return <span style={{ fontFamily:F.mono, fontSize:8, letterSpacing:2, color, border:`1px solid ${color}`, padding:"2px 6px", whiteSpace:"nowrap", flexShrink:0 }}>{label}</span>;
}

function Field({ label, children }) {
  return (
    <div>
      <div style={{ fontFamily:F.mono, fontSize:8, color:T.steelLo, letterSpacing:2, marginBottom:3 }}>{label}</div>
      <div style={{ fontSize:12, color:T.white }}>{children}</div>
    </div>
  );
}

function SaveIndicator({ state }) {
  if (!state) return null;
  const cfg = { saving:{ color:T.amber, text:"SAVING…" }, saved:{ color:T.green, text:"SAVED ✓" }, error:{ color:T.red, text:"ERROR ✗" }, offline:{ color:T.steel, text:"OFFLINE — mock only" } }[state];
  if (!cfg) return null;
  return <span style={{ fontFamily:F.mono, fontSize:8, letterSpacing:2, color:cfg.color, marginLeft:8 }}>{cfg.text}</span>;
}

function SectionHead({ title, count, saveState }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16 }}>
      <div style={{ fontFamily:F.mono, fontSize:9, letterSpacing:3, color:T.amber, textTransform:"uppercase" }}>{title}</div>
      {count !== undefined && <span style={{ fontFamily:F.mono, fontSize:9, color:T.steelLo, background:T.raised, border:`1px solid ${T.border}`, padding:"1px 7px" }}>{count}</span>}
      <SaveIndicator state={saveState} />
      {!SPINE_URL && <span style={{ fontFamily:F.mono, fontSize:7, color:T.steelLo, letterSpacing:2, marginLeft:"auto" }}>MOCK MODE</span>}
    </div>
  );
}

function Inp({ label, value, onChange, type="text", placeholder="" }) {
  return (
    <div>
      {label && <div style={{ fontFamily:F.mono, fontSize:8, color:T.steelLo, letterSpacing:2, marginBottom:4 }}>{label}</div>}
      <input type={type} value={value} onChange={onChange} placeholder={placeholder}
        style={{ width:"100%", background:T.surface, border:`1px solid ${T.border}`, color:T.white, fontFamily:F.mono, fontSize:12, padding:"8px 10px", outline:"none" }}
      />
    </div>
  );
}

function Sel({ label, value, onChange, options }) {
  return (
    <div>
      {label && <div style={{ fontFamily:F.mono, fontSize:8, color:T.steelLo, letterSpacing:2, marginBottom:4 }}>{label}</div>}
      <select value={value} onChange={onChange}
        style={{ width:"100%", background:T.surface, border:`1px solid ${T.border}`, color:T.white, fontFamily:F.mono, fontSize:12, padding:"8px 10px", outline:"none" }}>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}

function ProgressBar({ value, max, color }) {
  const pct = max > 0 ? Math.min(100, Math.round((value / max) * 100)) : 0;
  return (
    <div style={{ height:3, background:T.border, width:"100%" }}>
      <div style={{ height:3, width:`${pct}%`, background:color || T.amber, transition:"width 0.4s" }}/>
    </div>
  );
}

// ── LEADS MODULE ──────────────────────────────────────────────────────────────
function Leads() {
  const [leads, setLeads]         = useState(MOCK_LEADS);
  const [filter, setFilter]       = useState("ALL");
  const [selected, setSelected]   = useState(null);
  const [editing, setEditing]     = useState(null);  // lead_id being edited
  const [addOpen, setAddOpen]     = useState(false);
  const [saveState, setSaveState] = useState(null);

  // Load from spine on mount
  useEffect(() => {
    adapter.read("Leads").then(data => { if (data && data.length) setLeads(data); });
  }, []);

  const statuses = ["ALL","PITCH","DEMO","QUEUED","PROSPECT","STRATEGIC"];
  const visible  = filter === "ALL" ? leads : leads.filter(l => l.status === filter);
  const lead     = selected ? leads.find(l => l.lead_id === selected) : null;

  // Inline edit a field on the selected lead
  const [editBuf, setEditBuf] = useState({});

  function startEdit(l) {
    setEditing(l.lead_id);
    setEditBuf({ ...l });
  }

  async function saveEdit() {
    setSaveState("saving");
    const res = await adapter.updateRow("Leads", editBuf.lead_id, { ...editBuf, updated_at: new Date().toISOString() });
    if (res.offline) setSaveState("offline");
    else if (res.ok)  setSaveState("saved");
    else              setSaveState("error");
    setLeads(ls => ls.map(l => l.lead_id === editBuf.lead_id ? { ...editBuf } : l));
    setEditing(null);
    setTimeout(() => setSaveState(null), 2500);
  }

  // Add new lead
  const blankLead = { lead_id:"", name:"", vertical:"", location:"", status:"PROSPECT", stage:1, priority:"MEDIUM", contact:"", estimated_fee:0, next_action:"", follow_up_date:"", notes:"", source:"Manual" };
  const [newLead, setNewLead] = useState({ ...blankLead });

  async function submitNewLead() {
    const row = { ...newLead, lead_id: "lead-" + uid(), created_at: new Date().toISOString(), updated_at: new Date().toISOString() };
    setSaveState("saving");
    const res = await adapter.append("Leads", row);
    if (res.offline) setSaveState("offline");
    else if (res.ok)  setSaveState("saved");
    else              setSaveState("error");
    setLeads(ls => [...ls, row]);
    setNewLead({ ...blankLead });
    setAddOpen(false);
    setTimeout(() => setSaveState(null), 2500);
  }

  const setNL = k => e => setNL2({ ...newLead, [k]: e.target.value });
  function setNL2(v) { setNewLead(v); }

  return (
    <div>
      <SectionHead title="Lead Inbox" count={leads.length} saveState={saveState} />

      {/* Controls */}
      <div style={{ display:"flex", gap:2, marginBottom:12, overflowX:"auto", paddingBottom:2 }}>
        {statuses.map(f => (
          <button key={f} onClick={() => setFilter(f)} style={{
            background:filter===f?T.amber:T.raised, color:filter===f?T.bg:T.dim,
            border:`1px solid ${filter===f?T.amber:T.border}`,
            fontFamily:F.mono, fontSize:8, letterSpacing:2,
            padding:"5px 10px", cursor:"pointer", whiteSpace:"nowrap", flexShrink:0,
          }}>{f}</button>
        ))}
        <button onClick={() => { setAddOpen(o => !o); setSelected(null); setEditing(null); }} style={{
          marginLeft:"auto", background:T.green, color:T.bg, border:"none",
          fontFamily:F.mono, fontSize:8, letterSpacing:2, padding:"5px 12px", cursor:"pointer", flexShrink:0,
        }}>+ ADD LEAD</button>
      </div>

      {/* Add form */}
      {addOpen && (
        <div style={{ background:T.raised, border:`1px solid ${T.green}`, padding:16, marginBottom:14 }}>
          <div style={{ fontFamily:F.mono, fontSize:9, color:T.green, letterSpacing:2, marginBottom:12 }}>NEW LEAD</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
            <Inp label="BUSINESS NAME"  value={newLead.name}          onChange={e => setNewLead(v=>({...v,name:e.target.value}))} />
            <Inp label="VERTICAL"       value={newLead.vertical}      onChange={e => setNewLead(v=>({...v,vertical:e.target.value}))} />
            <Inp label="LOCATION"       value={newLead.location}      onChange={e => setNewLead(v=>({...v,location:e.target.value}))} />
            <Inp label="CONTACT"        value={newLead.contact}       onChange={e => setNewLead(v=>({...v,contact:e.target.value}))} />
            <Sel label="STATUS"         value={newLead.status}        onChange={e => setNewLead(v=>({...v,status:e.target.value}))}   options={["PROSPECT","DEMO","QUEUED","PITCH","STRATEGIC"]} />
            <Sel label="PRIORITY"       value={newLead.priority}      onChange={e => setNewLead(v=>({...v,priority:e.target.value}))} options={["HIGH","MEDIUM","LOW"]} />
            <Inp label="EST. FEE (PHP)" value={newLead.estimated_fee} onChange={e => setNewLead(v=>({...v,estimated_fee:e.target.value}))} type="number" />
            <Inp label="FOLLOW-UP DATE" value={newLead.follow_up_date}onChange={e => setNewLead(v=>({...v,follow_up_date:e.target.value}))} type="date" />
            <div style={{ gridColumn:"1/-1" }}>

            </div>
            <div style={{ gridColumn:"1/-1" }}>

            </div>

          <div style={{ display:"flex", gap:8 }}>

          </div>
        </div>
      )}

      {/* Edit form */}
      {editing && (
        <div style={{ background:T.raised, border:`1px solid ${T.amber}`, padding:16, marginBottom:14 }}>
          <div style={{ fontFamily:F.mono, fontSize:9, color:T.amber, letterSpacing:2, marginBottom:12 }}>EDITING: {editBuf.name}</div>

            <Inp label="CONTACT"        value={editBuf.contact}       onChange={e => setEditBuf(v=>({...v,contact:e.target.value}))} />
            <Inp label="EST. FEE (PHP)" value={editBuf.estimated_fee} onChange={e => setEditBuf(v=>({...v,estimated_fee:e.target.value}))} type="number" />
            <Inp label="FOLLOW-UP DATE" value={editBuf.follow_up_date}onChange={e => setEditBuf(v=>({...v,follow_up_date:e.target.value}))} type="date" />

            <Field label="EST. FEE">{lead.estimated_fee > 0 ? `₱${Number(lead.estimated_fee).toLocaleString()}` : "Strategic"}</Field>

            <div style={{ fontFamily:F.mono, fontSize:8, color:T.amber, letterSpacing:2, marginBottom:4 }}>NEXT ACTION</div>

          {lead.notes && <div style={{ marginTop:8, fontSize:11, color:T.dim, fontStyle:"italic" }}>{lead.notes}</div>}
        </div>
      )}

      {/* Lead list */}
      <div style={{ display:"grid", gap:2 }}>
        {visible.map(l => (
          <div key={l.lead_id} onClick={() => { setSelected(selected===l.lead_id?null:l.lead_id); setEditing(null); setAddOpen(false); }}

              border:`1px solid ${selected===l.lead_id?T.amber:T.border}`,

              </div>

                <Badge label={l.status} color={statusColor(l.status)}/>
                {Number(l.estimated_fee) > 0 && <span style={{ fontFamily:F.mono, fontSize:9, color:T.amber }}>₱{(Number(l.estimated_fee)/1000).toFixed(0)}K</span>}
              </div>
            </div>
            <div style={{ marginTop:7, fontSize:11, color:T.dim, borderTop:`1px solid ${T.border}`, paddingTop:6 }}>{l.next_action}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── FOLLOW-UPS MODULE ─────────────────────────────────────────────────────────
function FollowUps() {
  const [items, setItems]       = useState(MOCK_FOLLOWUPS);
  const [addOpen, setAddOpen]   = useState(false);
  const [saveState, setSaveState] = useState(null);
  const [newFU, setNewFU]       = useState({ client_name:"", type:"24HR", due_date:"", action:"", status:"PENDING" });

  useEffect(() => {
    adapter.read("FollowUps").then(data => { if (data && data.length) setItems(data); });
  }, []);

  async function markDone(id) {
    const now = new Date().toISOString();
    setSaveState("saving");
    const res = await adapter.updateRow("FollowUps", id, { status:"DONE", completed_at:now });
    if (res.offline) setSaveState("offline"); else if (res.ok) setSaveState("saved"); else setSaveState("error");
    setItems(is => is.map(i => i.followup_id === id ? { ...i, status:"DONE", completed_at:now } : i));
    setTimeout(() => setSaveState(null), 2000);
  }

  async function addFollowUp() {
    const row = { ...newFU, followup_id:"fu-"+uid(), lead_id:"", completed_at:"", notes:"" };
    setSaveState("saving");
    const res = await adapter.append("FollowUps", row);
    if (res.offline) setSaveState("offline"); else if (res.ok) setSaveState("saved"); else setSaveState("error");
    setItems(is => [...is, row]);
    setNewFU({ client_name:"", type:"24HR", due_date:"", action:"", status:"PENDING" });
    setAddOpen(false);
    setTimeout(() => setSaveState(null), 2000);
  }

  const active = items.filter(i => i.status !== "DONE");
  const done   = items.filter(i => i.status === "DONE");

  return (
    <div>
      <SectionHead title="Follow-Up Queue" count={active.length} saveState={saveState} />
      <div style={{ fontFamily:F.mono, fontSize:9, color:T.dim, marginBottom:12, letterSpacing:1 }}>CADENCE: 24HR → 72HR → 7DAY · NO EXCEPTIONS</div>

      <button onClick={() => setAddOpen(o=>!o)} style={{
        background:T.green, color:T.bg, border:"none",
        fontFamily:F.mono, fontSize:8, letterSpacing:2, padding:"6px 14px", cursor:"pointer", marginBottom:12,
      }}>+ ADD FOLLOW-UP</button>

      {addOpen && (
        <div style={{ background:T.raised, border:`1px solid ${T.green}`, padding:14, marginBottom:12 }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
            <Inp label="CLIENT NAME" value={newFU.client_name} onChange={e=>setNewFU(v=>({...v,client_name:e.target.value}))} />
            <Sel label="TYPE" value={newFU.type} onChange={e=>setNewFU(v=>({...v,type:e.target.value}))} options={["24HR","72HR","7DAY","BUILD","DEBRIEF","CUSTOM"]} />
            <Inp label="DUE DATE" value={newFU.due_date} onChange={e=>setNewFU(v=>({...v,due_date:e.target.value}))} type="date" />
            <div style={{ gridColumn:"1/-1" }}>
              <Inp label="ACTION" value={newFU.action} onChange={e=>setNewFU(v=>({...v,action:e.target.value}))} />
            </div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={addFollowUp} style={{ background:T.green, color:T.bg, border:"none", fontFamily:F.mono, fontSize:9, letterSpacing:2, padding:"7px 14px", cursor:"pointer" }}>SAVE TO SPINE</button>
            <button onClick={() => setAddOpen(false)} style={{ background:"none", border:`1px solid ${T.border}`, color:T.dim, fontFamily:F.mono, fontSize:9, letterSpacing:2, padding:"7px 12px", cursor:"pointer" }}>CANCEL</button>
          </div>
        </div>
      )}

      <div style={{ display:"grid", gap:2 }}>
        {active.map(f => (
          <div key={f.followup_id} style={{
            background: f.status==="OVERDUE" ? T.redBg : T.raised,
            border:`1px solid ${f.status==="OVERDUE"?T.red:T.border}`,
            padding:"11px 13px",
          }}>
            <div style={{ display:"flex", justifyContent:"space-between", gap:8 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:4, flexWrap:"wrap" }}>
                  <Badge label={f.type} color={f.status==="OVERDUE"?T.red:T.amber}/>
                  <span style={{ fontSize:13, color:T.white }}>{f.client_name}</span>
                </div>
                <div style={{ fontSize:11, color:T.dim }}>{f.action}</div>
                <div style={{ fontFamily:F.mono, fontSize:9, color:f.status==="OVERDUE"?T.red:T.steelLo, marginTop:3 }}>
                  {f.status==="OVERDUE"?"⚠ OVERDUE":"DUE"} · {f.due_date}
                </div>
              </div>
              <button onClick={() => markDone(f.followup_id)} style={{
                background:T.green, border:"none", color:T.bg,
                fontFamily:F.mono, fontSize:8, letterSpacing:2,
                padding:"6px 10px", cursor:"pointer", flexShrink:0, alignSelf:"flex-start",
              }}>DONE ✓</button>
            </div>
          </div>
        ))}
        {done.length > 0 && (
          <div style={{ fontFamily:F.mono, fontSize:9, color:T.steelLo, letterSpacing:2, marginTop:8 }}>
            {done.length} COMPLETED
          </div>
        )}
      </div>
    </div>
  );
}

// ── AI CONSOLE ────────────────────────────────────────────────────────────────
function AIConsole({ leads, followups }) {
  const [loading, setLoading] = useState(false);
  const [output, setOutput]   = useState(null);
  const [custom, setCustom]   = useState("");
  const [active, setActive]   = useState(null);

  const pipeline = leads.reduce((s,l) => s+(Number(l.estimated_fee)||0), 0);
  const overdue  = followups.filter(f=>f.status==="OVERDUE").map(f=>f.client_name).join(", ");

  const ACTIONS = [
    "Analyze leads — find highest-probability close",
    "Draft 72hr follow-up for Hotel Rosita",
    "Draft close message for Queen Margarette",
    "Generate this week's Foundry owner brief",
    "Identify revenue gaps in the pipeline",
    "Write Nalu Surf Camp demo intro walk-in script",
    "Draft Ecopetrol presentation opening",
    "Suggest 3 next prospects to target after Lucena",
  ];

  async function run(prompt) {
    setLoading(true); setOutput(null);
    const context = `Current Foundry pipeline:
- Total prospects: ${leads.length}
- Demos live: ${leads.filter(l=>l.status==="DEMO").length}
- In pitch: ${leads.filter(l=>l.status==="PITCH").length} (${overdue || "none overdue"})
- Pipeline value: ₱${(pipeline/1000).toFixed(0)}K unbooked
- 0 closes so far
- Setup revenue target: PHP 100K in 8 weeks
- MRR target: PHP 25K in 8 weeks`;

    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:`You are the AI action console for Aurora Digital Foundry — a business infrastructure agency in Baler, Aurora Province, Philippines. Be direct, operator-grade, no filler. Produce useful artifacts: draft messages, ranked lists, action plans. Use PHP for currency.\n\n${context}`,
          messages:[{ role:"user", content:prompt }],
        }),
      });
      const d = await r.json();
      setOutput(d.content?.map(b=>b.text||"").join("\n") || "No response.");
    } catch(e) { setOutput("Error: " + e.message); }
    setLoading(false);
  }

  return (
    <div>
      <SectionHead title="AI Action Console" />
      <div style={{ fontFamily:F.mono, fontSize:9, color:T.dim, marginBottom:12, letterSpacing:1 }}>CLAUDE · FOUNDRY CONTEXT LIVE</div>

      <div style={{ display:"grid", gap:2, marginBottom:12 }}>
        {ACTIONS.map((a,i) => (
          <button key={i} onClick={() => { setActive(i); run(a); }} style={{
            background:active===i?T.amberBg:T.raised,
            border:`1px solid ${active===i?T.amber:T.border}`,
            color:active===i?T.amber:T.dim,
            fontFamily:F.mono, fontSize:10, letterSpacing:1,
            padding:"10px 13px", cursor:"pointer", textAlign:"left", transition:"all 0.12s",
          }}>{a}</button>
        ))}
      </div>

      <div style={{ display:"flex", gap:2, marginBottom:12 }}>
        <input value={custom} onChange={e=>setCustom(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"){ setActive(null); run(custom); }}}
          placeholder="Type a command…"
          style={{ flex:1, background:T.surface, border:`1px solid ${T.border}`, color:T.white, fontFamily:F.mono, fontSize:11, padding:"9px 12px", outline:"none" }}
        />
        <button onClick={() => { setActive(null); run(custom); }} style={{
          background:T.amber, color:T.bg, border:"none",
          fontFamily:F.display, fontSize:14, letterSpacing:2,
          padding:"9px 16px", cursor:"pointer",
        }}>RUN</button>
      </div>

      {loading && (
        <div style={{ background:T.raised, border:`1px solid ${T.border}`, padding:14 }}>
          <div style={{ fontFamily:F.mono, fontSize:10, color:T.amber, letterSpacing:2 }}>PROCESSING<span style={{ animation:"blink 1s infinite" }}>_</span></div>
        </div>
      )}
      {output && !loading && (
        <div style={{ background:T.raised, border:`1px solid ${T.amber}`, padding:14 }}>
          <div style={{ fontFamily:F.mono, fontSize:8, letterSpacing:3, color:T.amber, marginBottom:8 }}>OUTPUT</div>
          <div style={{ fontSize:12, color:T.white, lineHeight:1.7, whiteSpace:"pre-wrap" }}>{output}</div>
        </div>
      )}
    </div>
  );
}
