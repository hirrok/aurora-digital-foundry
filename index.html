const SPINE_URL = "";

async function submitLead(data) {
  if (!SPINE_URL) return { ok:false, offline:true };
  try {
    const r = await fetch(SPINE_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ action:"append", sheet:"Leads", data }),
    });
    return await r.json();
  } catch(e) { return { ok:false, error:e.message }; }
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function useIsMobile() {
  const [m, setM] = useState(window.innerWidth < 720);
  useEffect(() => {
    const h = () => setM(window.innerWidth < 720);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return m;
}

function useScrollSpy() {
  const [active, setActive] = useState("home");
  useEffect(() => {
    const ids = ["home","method","infrastructure","faq","pricing","contact"];
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); }),
      { rootMargin:"-35% 0px -55% 0px" }
    );
    ids.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);
  return active;
}

      mixBlendMode:"multiply",
    }}/>
  );
}

// ── LEAD FORM ─────────────────────────────────────────────────────────────────
function LeadForm() {
  const isMobile = useIsMobile();
  const blank = { name:"", owner:"", location:"", industry:"", web:"", contact:"", goal:"" };
  const [form, setForm]   = useState(blank);
  const [state, setState] = useState("idle"); // idle | submitting | done | error | offline

  const set = k => e => setForm(v => ({ ...v, [k]:e.target.value }));

  async function submit() {
    if (!form.name || !form.contact) return;
    setState("submitting");
    const row = {
      lead_id:       "pub-" + uid(),
      created_at:    new Date().toISOString(),
      name:          form.name,
      vertical:      form.industry,
      location:      form.location,
      status:        "PROSPECT",
      stage:         1,
      priority:      "MEDIUM",
      contact:       form.contact,
      source:        "Website",
      estimated_fee: 0,
      next_action:   form.goal || "Initial inquiry from website",
      follow_up_date:"",
      notes:         `Owner: ${form.owner} | Web: ${form.web} | Goal: ${form.goal}`,
      updated_at:    new Date().toISOString(),
    };
    const res = await submitLead(row);
    if (res.offline) setState("offline");
    else if (res.ok) {
      // Auto-create 24HR follow-up in the spine
      const fu = {
        followup_id:  "fu-pub-" + uid(),
        lead_id:      row.lead_id,
        client_name:  row.name,
        type:         "24HR",
        due_date:     new Date(Date.now() + 86400000).toISOString().slice(0,10),
        action:       `New website inquiry — respond to ${row.contact || "contact"}`,
        status:       "PENDING",
        completed_at: "",
        notes:        `Source: Website form · Goal: ${form.goal}`,
      };
      await fetch(SPINE_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ action:"append", sheet:"FollowUps", data:fu }),
      }).catch(()=>{}); // non-blocking
      setState("done");
    }
    else setState("error");
  }

  const inp = (key, label, placeholder, type="text", full=false) => (
    <div style={{ gridColumn: full?"1/-1":"auto" }}>
      <div style={{ fontFamily:F.mono, fontSize:8, color:T.steelLo, letterSpacing:3, marginBottom:5, textTransform:"uppercase" }}>{label}</div>
      <input type={type} placeholder={placeholder} value={form[key]} onChange={set(key)}
        style={{
          width:"100%", background:"transparent", border:`1px solid ${T.border}`,
          color:T.white, fontFamily:F.mono, fontSize:12, padding:"11px 13px",
          outline:"none", WebkitAppearance:"none",
        }}
      />
    </div>
  );

  if (state === "done") return (
    <div style={{ padding:32, border:`1px solid ${T.amber}`, background:T.amberGlow, textAlign:"center" }}>
      <div style={{ fontFamily:F.display, fontSize:32, color:T.amber, letterSpacing:2, marginBottom:8 }}>MESSAGE RECEIVED</div>
      <div style={{ fontFamily:F.serif, fontStyle:"italic", color:T.steel, lineHeight:1.6 }}>
        We'll review your details and reach out within 24 hours with a plan.
      </div>
    </div>
  );

  if (state === "offline") return (
    <div style={{ padding:24, border:`1px solid ${T.steel}`, background:T.card }}>
      <div style={{ fontFamily:F.display, fontSize:20, color:T.white, letterSpacing:2, marginBottom:8 }}>FORM NOT YET CONNECTED</div>
      <div style={{ fontSize:13, color:T.steel, lineHeight:1.6, marginBottom:12 }}>
        The data spine isn't wired yet. Reach out directly while we finish setup:
      </div>
      <div style={{ fontFamily:F.mono, fontSize:12, color:T.amber }}>hirro@auroradigitalfoundry.com</div>
    </div>
  );

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))", gap:12, marginBottom:14 }}>
        {inp("name",     "Business Name",              "Your business name")}
        {inp("owner",    "Your Name",                  "Owner or decision-maker")}
        {inp("location", "Location",                   "Municipality, Province")}
        {inp("industry", "Industry",                   "Tourism · Food · Commerce…")}
        {inp("web",      "Website or Facebook Page",   "URL or page name")}
        {inp("contact",  "Phone or Email",             "Best way to reach you")}
        <div style={{ gridColumn:"1/-1" }}>
          <div style={{ fontFamily:F.mono, fontSize:8, color:T.steelLo, letterSpacing:3, marginBottom:5, textTransform:"uppercase" }}>What do you want improved?</div>
          <textarea rows={3} placeholder="More bookings · better Google visibility · inquiry system…"
            value={form.goal} onChange={set("goal")}
            style={{
              width:"100%", background:"transparent", border:`1px solid ${T.border}`,
              color:T.white, fontFamily:F.mono, fontSize:12, padding:"11px 13px",
              outline:"none", resize:"vertical",
            }}
          />
        </div>
      </div>
      <button onClick={submit} disabled={state==="submitting"}
        style={{
          width:"100%", background:state==="submitting"?T.amberLo:T.amber,
          color:T.bg, border:"none", fontFamily:F.display, fontSize:22, letterSpacing:3,
          padding:"16px", cursor:state==="submitting"?"not-allowed":"pointer",
          transition:"background 0.2s",
        }}>
        {state==="submitting" ? "SENDING…" : "REQUEST A PROTOTYPE"}
      </button>
      {state==="error" && (
        <div style={{ fontFamily:F.mono, fontSize:10, color:"#E04444", marginTop:8, letterSpacing:1 }}>
          Something went wrong. Try again or email us directly.
        </div>
      )}
    </div>
  );
}

                background:T.card, border:`1px solid ${T.border}`,

                padding:"20px 20px",
                gridColumn: i===4 && !isMobile ? "1/-1" : "auto",
              }}>
                <div style={{ fontFamily:F.mono, fontSize:8, color:T.amberLo, letterSpacing:3, marginBottom:8 }}>{s.n}</div>
                <div style={{ fontFamily:F.display, fontSize:20, letterSpacing:2, color:T.white, marginBottom:8 }}>{s.title}</div>
                <div style={{ fontSize:13, color:T.steel, lineHeight:1.7 }}>{s.body}</div>
              </div>
            ))}
          </div>

          {/* Trust strip */}
          <div style={{ marginTop:32, display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:2 }}>
            {[
              { stat:"₱0",      label:"Cost to see your demo",          sub:"We build it before you decide." },
              { stat:"24hrs",   label:"Response after you reach out",   sub:"No queues, no ticketing system." },
              { stat:"100%",    label:"Your accounts, your ownership",  sub:"Domain, GBP, Analytics — yours." },
              { stat:"Day 1",   label:"Google visibility starts here",  sub:"Setup and Search Console from launch." },
            ].map((s,i) => (
              <div key={i} style={{ background:T.card, border:`1px solid ${T.border}`, padding:"18px 20px" }}>
                <div style={{ fontFamily:F.display, fontSize:36, color:T.amber, letterSpacing:1, lineHeight:1, marginBottom:6 }}>{s.stat}</div>
                <div style={{ fontSize:12, color:T.white, marginBottom:4 }}>{s.label}</div>
                <div style={{ fontFamily:F.mono, fontSize:9, color:T.steelLo, letterSpacing:1 }}>{s.sub}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── INFRASTRUCTURE ───────────────────────────────────────────────── */}
      <section id="infrastructure" style={{ borderTop:`1px solid ${T.border}` }}>
        <div style={{ ...MW, padding:P }}>
          <EyebrowLabel>What We Build</EyebrowLabel>
          <Headline>NOT JUST A WEBSITE.<br/><span style={{ color:T.amber }}>FULL INFRASTRUCTURE.</span></Headline>
          <Sub>Every engagement addresses all five layers — not just the front door.</Sub>

          <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(300px,1fr))", gap:2, marginBottom:40 }}>
            {LAYERS.map((l,i) => (
              <div key={i} style={{ background:T.card, border:`1px solid ${T.border}`, padding:"22px 20px" }}>
                <div style={{ fontSize:18, color:T.amber, marginBottom:10 }}>{l.icon}</div>
                <div style={{ fontFamily:F.display, fontSize:18, letterSpacing:2, color:T.white, marginBottom:8 }}>{l.title}</div>
                <div style={{ fontSize:13, color:T.steel, lineHeight:1.7 }}>{l.body}</div>
              </div>
            ))}
          </div>

          {/* Ownership note */}
          <div style={{ padding:"18px 20px", border:`1px solid ${T.border}`, background:T.card, display:"flex", gap:14, alignItems:"flex-start" }}>
            <div style={{ color:T.amber, fontSize:18, flexShrink:0 }}>⚑</div>
            <div>
              <div style={{ fontFamily:F.display, fontSize:16, letterSpacing:2, color:T.white, marginBottom:5 }}>YOU OWN EVERYTHING</div>
              <div style={{ fontSize:13, color:T.steel, lineHeight:1.7 }}>
                Your domain, Google Business Profile, Search Console, Analytics, and all core accounts are registered in your name from day one. Aurora Digital Foundry holds manager access only — for maintenance. If you ever leave, every account leaves with you.
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ── FAQ ──────────────────────────────────────────────────────────── */}
      <section id="faq" style={{ borderTop:`1px solid ${T.border}` }}>
        <div style={{ ...MW, padding:P }}>
          <EyebrowLabel>Common Questions</EyebrowLabel>
          <Headline>THINGS OWNERS<br/><span style={{ color:T.amber }}>USUALLY ASK.</span></Headline>
          <Sub>Straight answers. No sales language.</Sub>

          <div style={{ display:"grid", gap:2 }}>
            {[
              {
                q:"We already have Facebook. Why do we need a website?",
                a:"Keep Facebook — it stays your social channel. The website becomes the home base that Google, Maps, your Facebook posts, and word-of-mouth all point to. Customers who find you on Google need somewhere to land that shows your hours, rates, location, and how to book or inquire. Facebook doesn't do that job.",
              },
              {
                q:"Can't people just message us directly?",
                a:"Yes, and they will. But a website filters the easy questions first — rates, hours, location, what's included. You get cleaner messages from people who are already ready to book, not just browsing.",
              },
              {
                q:"What does it cost to see what you'd build for us?",
                a:"Nothing. We build a working demo of your business and show it to you before you spend anything. If you like it, we talk about going live. If you don't, you've lost nothing.",
              },
              {
                q:"Who owns the domain and accounts?",
                a:"You do. Your domain is registered under your name and email. Your Google Business Profile, Search Console, and Analytics all live in your Google account. We hold manager access for maintenance only. If you ever stop working with us, everything stays yours.",
              },
              {
                q:"How long does it take to launch?",
                a:"Once we have your content approved and your domain purchased, most sites are live within 10 business days. Demos are typically ready to view within a few days of our first conversation.",
              },
              {
                q:"What if we need changes after it's live?",
                a:"That's what the maintenance plan covers. Text updates, photo swaps, menu or rate changes, hours, promos — all handled under your tier. Anything larger becomes a written change request with a clear scope before we start.",
              },
              {
                q:"Can you guarantee we'll rank on Google?",
                a:"No honest operator can. What we can guarantee is the right foundation: accurate business data, clean mobile experience, fast load, Google Business Profile aligned, and ongoing upkeep. That's what search rewards over time.",
              },
            ].map((f,i) => <FAQItem key={i} q={f.q} a={f.a} />)}
          </div>

          <div style={{ marginTop:24 }}>
            <CTA primary onClick={() => go("contact")} fullWidth={isMobile}>STILL HAVE QUESTIONS — REACH OUT</CTA>
          </div>
        </div>
      </section>

      {/* ── PRICING ──────────────────────────────────────────────────────── */}
      <section id="pricing" style={{ borderTop:`1px solid ${T.border}` }}>
        <div style={{ ...MW, padding:P }}>
          <EyebrowLabel>Pricing</EyebrowLabel>
          <Headline>SETUP. LAUNCH.<br/><span style={{ color:T.amber }}>MAINTAIN.</span></Headline>
          <Sub>One-time infrastructure setup plus a predictable monthly plan. No surprises, no lock-in.</Sub>

          {/* Packages */}
          <div style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"repeat(3,1fr)", gap:2, marginBottom:40 }}>
            {PACKAGES.map((p,i) => (
              <div key={i} style={{
                background: p.highlight ? T.amberGlow : T.card,
                border:     `2px solid ${p.highlight ? T.amber : T.border}`,
                padding:    isMobile?"22px":"28px",
                display:    "flex", flexDirection:"column",
              }}>
                <div style={{ fontFamily:F.display, fontSize:28, letterSpacing:3, color:p.highlight?T.amber:T.white, marginBottom:4 }}>{p.name}</div>
                <div style={{ fontFamily:F.mono, fontSize:isMobile?16:20, color:T.white, marginBottom:4 }}>{p.fee}</div>
                <div style={{ fontFamily:F.mono, fontSize:10, color:T.steel, marginBottom:20 }}>{p.fit}</div>
                <div style={{ flex:1, marginBottom:24 }}>
                  {p.includes.map((item,j) => (
                    <div key={j} style={{ display:"flex", gap:8, marginBottom:7 }}>
                      <span style={{ color:T.amber, fontSize:10, flexShrink:0, marginTop:1 }}>✓</span>
                      <span style={{ fontSize:12, color:T.muted }}>{item}</span>
                    </div>
                  ))}
                </div>
                <button onClick={() => go("contact")} style={{
                  background:p.highlight?T.amber:"transparent",
                  color:     p.highlight?T.bg:T.muted,
                  border:    `1px solid ${p.highlight?T.amber:T.border}`,
                  fontFamily:F.mono, fontSize:9, letterSpacing:2,
                  padding:"10px", cursor:"pointer", width:"100%",
                }}>GET STARTED</button>
              </div>
            ))}
          </div>

          {/* Maintenance */}
          <EyebrowLabel>Maintenance Tiers</EyebrowLabel>
          <div style={{ display:"grid", gap:2, marginBottom:32 }}>
            {MAINTENANCE.map((m,i) => (
              <div key={i} style={{
                background:T.card,
                borderLeft:`3px solid ${i===2?T.amber:i===1?"#A06B12":T.steelLo}`,
                padding:isMobile?"15px":"15px 20px",
              }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:8, marginBottom:6 }}>
                  <div style={{ fontFamily:F.display, fontSize:isMobile?18:20, letterSpacing:2, color:T.white }}>{m.tier}</div>
                  <div style={{ display:"flex", gap:16 }}>
                    <div>
                      <div style={{ fontFamily:F.mono, fontSize:7, color:T.steelLo, letterSpacing:2 }}>MONTHLY</div>
                      <div style={{ fontFamily:F.mono, fontSize:13, color:T.amber }}>{m.mo}</div>
                    </div>
                    <div>
                      <div style={{ fontFamily:F.mono, fontSize:7, color:T.steelLo, letterSpacing:2 }}>YEARLY</div>
                      <div style={{ fontFamily:F.mono, fontSize:12, color:T.muted }}>{m.yr}</div>
                    </div>
                  </div>
                </div>
                <div style={{ fontSize:12, color:T.steel }}>{m.desc}</div>
              </div>
            ))}
          </div>

          <div style={{ padding:"14px 18px", border:`1px solid ${T.border}`, background:T.card, fontFamily:F.mono, fontSize:10, color:T.steelLo, letterSpacing:1 }}>
            The demo is always free. Going live is a one-time setup fee. Staying live is a maintenance plan — optional, but recommended.
          </div>
        </div>
      </section>

      {/* ── CONTACT ──────────────────────────────────────────────────────── */}
      <section id="contact" style={{ borderTop:`1px solid ${T.border}` }}>
        <div style={{ ...MW, padding:isMobile?"48px 16px 72px":"88px 28px 112px" }}>
          <EyebrowLabel>Request a Prototype</EyebrowLabel>
          <Headline>LET'S BUILD YOUR<br/><span style={{ color:T.amber }}>FUTURE BUSINESS.</span></Headline>
          <Sub>Drop your details. We'll build a working prototype of your upgraded operation and show you what it looks like — before you commit to anything.</Sub>
          <LeadForm/>
        </div>
      </section>

      {/* ── FOOTER ───────────────────────────────────────────────────────── */}
      <footer style={{
        borderTop:`1px solid ${T.border}`,
        padding:isMobile?"20px 16px":"24px 28px",
      }}>
        <div style={{ ...MW, display:"flex", flexDirection:isMobile?"column":"row", justifyContent:"space-between", gap:10 }}>
          <div style={{ fontFamily:F.display, fontSize:14, letterSpacing:4, color:T.steelLo }}>AURORA DIGITAL FOUNDRY</div>
          <div style={{ fontFamily:F.mono, fontSize:9, color:T.steelLo, letterSpacing:2 }}>BALER · AURORA PROVINCE · PHILIPPINES · EST. 2026</div>
          <div style={{ fontFamily:F.mono, fontSize:9, color:T.steelLo, letterSpacing:2 }}>
            <button onClick={() => go("contact")} style={{ background:"none", border:"none", color:T.amber, fontFamily:F.mono, fontSize:9, letterSpacing:2, cursor:"pointer", padding:0 }}>
              REQUEST A PROTOTYPE →
            </button>
          </div>
        </div>
      </footer>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(AuroraDigitalFoundry));
  </script>
</body>
</html>
